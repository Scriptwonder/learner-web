<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learner — Math for Computer Graphics</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23d4a04a'/><g transform='translate(6,6)' fill='none' stroke='%23080b14' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 1L1 5.5l9 4.5 9-4.5L10 1z'/><path d='M1 14.5l9 4.5 9-4.5'/><path d='M1 10l9 4.5 9-4.5'/></g></svg>">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
      "codemirror": "https://esm.sh/@codemirror/view@6.35.0?external=@codemirror/state",
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.35.0?external=@codemirror/state",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.8?external=@codemirror/state,@codemirror/view",
      "@codemirror/legacy-modes/mode/clike": "https://esm.sh/@codemirror/legacy-modes@6.4.2/mode/clike?external=@codemirror/state,@codemirror/language",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.7.1?external=@codemirror/state,@codemirror/view",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2?external=@codemirror/state,@codemirror/view,@codemirror/language"
    }
  }
  </script>
  <!-- Prevent flash of wrong theme -->
  <script>
    (function(){var t=localStorage.getItem('learner:theme')||
    (matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
    document.documentElement.setAttribute('data-theme',t)})();
  </script>
</head>
<body>
  <!-- Accessibility: skip link -->
  <a href="#study-content" class="skip-link">Skip to content</a>

  <div class="grid-bg" aria-hidden="true"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div id="course-browser-screen" class="screen active" role="main" aria-label="Course browser">
    <div class="course-browser">
      <div class="course-browser-header">
        <div class="course-browser-brand">
          <div class="app-logo-mark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="course-browser-title">Learner</div>
        </div>
        <div class="course-browser-tagline">master the math behind the pixels</div>
      </div>
      <div class="course-list" id="course-list"></div>
    </div>
  </div>

  <div id="study-screen" class="screen" role="main" aria-label="Study">
    <nav class="study-sidebar" aria-label="Lesson navigation">
      <div class="toc-label">Contents</div>
      <div class="toc-list" id="toc-list"></div>
      <button class="btn-quiz study-sidebar-quiz btn-icon" id="btn-quiz-from-study"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Quiz Me</button>
    </nav>
    <article class="study-content" id="study-content"></article>
    <div class="viz-panel" id="viz-panel">
      <div class="viz-header">
        <div class="viz-logo">
          <div class="app-logo-mark viz-logo-mark">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="viz-logo-text">Visualizer</span>
        </div>
        <div class="viz-tab-group">
          <button class="viz-tab active" id="viz-tab-3d" data-tab="3d">3D</button>
          <button class="viz-tab" id="viz-tab-code" data-tab="code">Code</button>
        </div>
        <button class="viz-theme-toggle" id="viz-theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
      <div class="viz-canvas-wrap" id="viz-canvas-wrap">
        <div class="viz-info-pill" id="viz-info"></div>
      </div>
      <div class="viz-code-wrap" id="viz-code-wrap" style="display:none;">
        <pre class="viz-code-block"><code id="viz-code-content"></code></pre>
      </div>
      <div class="viz-controls" id="viz-controls"></div>
    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <!-- Quiz Setup -->
    <div id="quiz-setup" class="quiz-setup">
      <div class="quiz-setup-header">Ready to test your knowledge?</div>
      <div class="quiz-setup-lesson" id="quiz-setup-lesson"></div>

      <div class="quiz-setup-section">
        <div class="quiz-setup-label">Mode</div>
        <div class="quiz-mode-selector" id="quiz-mode-selector">
          <button class="mode-btn active" data-mode="practice">
            <span class="mode-icon">&#9998;</span>
            <span class="mode-name">Practice</span>
            <span class="mode-desc">Hints available, relaxed scoring</span>
          </button>
          <button class="mode-btn" data-mode="test">
            <span class="mode-icon">&#9733;</span>
            <span class="mode-name">Test</span>
            <span class="mode-desc">No hints, full scoring</span>
          </button>
          <button class="mode-btn" data-mode="challenge">
            <span class="mode-icon">&#9889;</span>
            <span class="mode-name">Challenge</span>
            <span class="mode-desc">Hard questions only</span>
          </button>
        </div>
      </div>

      <div class="quiz-setup-section">
        <div class="quiz-setup-label">Questions</div>
        <div class="quiz-count-selector" id="quiz-count-selector">
          <button class="count-btn" data-count="5">5</button>
          <button class="count-btn active" data-count="10">10</button>
          <button class="count-btn" data-count="15">15</button>
          <button class="count-btn" data-count="all">All</button>
        </div>
      </div>

      <div class="quiz-setup-section">
        <label class="quiz-toggle">
          <input type="checkbox" id="include-review" checked>
          <span class="toggle-text">Include review questions from past lessons</span>
        </label>
      </div>

      <button class="btn-start-quiz" id="btn-start-quiz">Start Quiz</button>
    </div>

    <!-- Quiz Active -->
    <div id="quiz-active" style="display:none;">
      <div class="quiz-header">
        <div class="quiz-progress-text">Question <strong id="quiz-current">1</strong> of <span id="quiz-total">5</span></div>
        <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
      </div>
      <div class="quiz-badges">
        <div class="quiz-type-label" id="quiz-type-label">Short Answer</div>
        <div class="quiz-difficulty-badge" id="quiz-difficulty-badge"></div>
        <div class="quiz-review-badge" id="quiz-review-badge" style="display:none;">Review</div>
      </div>
      <div class="quiz-question" id="quiz-question"></div>
      <div id="quiz-answer-area"></div>
      <div class="quiz-action-row" id="quiz-action-row">
        <button class="btn-hint" id="btn-hint" style="display:none;">Show Hint</button>
        <button class="btn-submit" id="btn-submit-answer">Submit Answer</button>
      </div>
      <div id="quiz-hint-area" style="display:none;"></div>
      <div id="quiz-feedback"></div>
      <div class="quiz-next-row" id="quiz-next-row" style="display:none;">
        <button class="link-study-material" id="btn-view-study">View Study Material</button>
        <button class="btn-next" id="btn-next-question">Next</button>
      </div>
    </div>
  </div>

  <div id="shader-editor-screen" class="screen" role="main" aria-label="Shader Editor">
    <div class="shader-editor">
      <!-- Left: Code Editor -->
      <div class="se-editor-panel">
        <div class="se-editor-tabs">
          <button class="se-tab active" data-lang="glsl">GLSL</button>
          <button class="se-tab" data-lang="hlsl">HLSL</button>
          <button class="se-tab" data-lang="slang">Slang</button>
        </div>
        <div class="se-editor-wrap" id="se-editor-wrap"></div>
        <div class="se-error-bar" id="se-error-bar"></div>
      </div>
      <!-- Right: Vis + Challenge -->
      <div class="se-side-panel">
        <!-- Hero canvas: user output fills the space -->
        <div class="se-preview">
          <div class="se-canvas-hero">
            <canvas id="se-canvas-user" width="256" height="256"></canvas>
            <!-- Target as overlay thumbnail -->
            <div class="se-target-overlay">
              <div class="se-target-label">TARGET</div>
              <canvas id="se-canvas-target" width="256" height="256"></canvas>
            </div>
            <!-- Match badge floating on canvas -->
            <div class="se-match" id="se-match">Match: —</div>
          </div>
        </div>
        <!-- Compact challenge bar -->
        <div class="se-challenge" id="se-challenge">
          <div class="se-challenge-header">
            <span class="se-challenge-num" id="se-challenge-num">Challenge 1/3</span>
            <span class="se-challenge-title" id="se-challenge-title"></span>
            <div class="se-dots" id="se-dots"></div>
          </div>
          <div class="se-challenge-desc" id="se-challenge-desc"></div>
          <div class="se-hints" id="se-hints"></div>
          <div class="se-primer-toggle" id="se-primer-toggle">
            <span>Primer</span>
            <span class="se-primer-arrow">&#9656;</span>
          </div>
          <div class="se-primer" id="se-primer" style="display:none;"></div>
          <div class="se-theory" id="se-theory" style="display:none;"></div>
          <div class="se-challenge-footer">
            <div class="se-actions">
              <button class="se-btn se-btn-reset" id="se-btn-reset">Reset</button>
              <button class="se-btn se-btn-submit" id="se-btn-submit">Submit</button>
            </div>
            <div class="se-nav">
              <button class="se-nav-btn" id="se-nav-prev" disabled>&#9664;</button>
              <button class="se-nav-btn" id="se-nav-next">&#9654;</button>
            </div>
            <button class="se-btn se-btn-back" id="se-btn-back">&#8592; Course</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/theme-toggle.js"></script>
  <script src="js/render-markdown.js"></script>
  <script src="js/app.js"></script>
  <script src="js/study.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/course-browser.js"></script>
  <script src="js/shader-translator.js?v=2"></script>
  <script src="js/shader-renderer.js?v=2"></script>
  <script src="js/shader-challenges.js?v=2"></script>
  <script type="module" src="js/shader-editor.js?v=2"></script>
  <script type="module" src="js/visualizer.js"></script>
</body>
</html>
